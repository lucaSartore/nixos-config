# Theming
font: JetBrainsMono Nerd Font 12
background: "#282828d0"
color: "#fbf1c7"
border: "#4fa6ed"
separator: " ➜ "
border_width: 2
corner_r: 10
padding: 15 # Defaults to corner_r
rows_per_column: 5 # No limit by default
column_padding: 25 # Defaults to padding

# Anchor and margin
anchor: center # One of center, left, right, top, bottom, bottom-left, top-left, etc.
# Only relevant when anchor is not center
margin_right: 0
margin_bottom: 0
margin_left: 0
margin_top: 0

# namespace to use for the layer shell surface
# namespace: "wlr_which_key"

# Permits key bindings that conflict with compositor key bindings.
# Default is `false`.
inhibit_compositor_keyboard_shortcuts: true

# Try to guess the correct keyboard layout to use. Default is `false`.
auto_kbd_layout: true

menu:
  - key: "s"
    desc: ⚙️ Settings
    submenu:
      - key: "d"
        desc: 🖥️ Display Settings
        cmd: nwg-displays
      - key: "n"
        desc: 📡 Network Settings
        cmd: iwgtk
      - key: "b"
        desc: 🅱️ Bluetooth Settings
        cmd: overskride
      - key: "a"
        desc: 🔉 Audio settings
        cmd: pavucontrol
  - key: "l"
    desc: ⚡ Launch
    submenu:
      - key: "t"
        desc: 💻 Terminal
        cmd: ghostty
      - key: "c"
        desc: 📝 VsCode
        cmd: code
      - key: "b"
        desc: 🌐 Browser
        cmd: google-chrome-stable
      - key: "f"
        desc: 📂 Files
        cmd: dolphin
  - key: "x"
    desc: 🚀 Power
    submenu:
      - key: "l"
        desc: 🔒 Lock
        cmd: swaylock
      - key: "s"
        desc: 💤 Suspend
        cmd: systemctl suspend
      - key: "r"
        desc: 🔄 Reboot
        cmd: reboot
      - key: "p"
        desc: 🛑 Power Off
        cmd: poweroff
